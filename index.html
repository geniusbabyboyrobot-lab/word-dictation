                    <div id="feedback-status" style="font-weight:bold; font-size:1.2rem; margin-bottom:12px; border-bottom:1px solid #e2e8f0; padding-bottom:8px; color: ${isCorrect && meaningIncomplete ? 'var(--warning-color)' : (isCorrect ? 'var(--success-color)' : 'var(--error-color)')}">
                        ${statusText}
                    </div>
                    <div style="font-size:1.05rem; line-height:1.7;">
                        <div style="margin-bottom:10px;">
                            <div>你的拼写：<strong>${highlightedSpelling}</strong></div>
                            ${this.dictationMode === 'spelling' ? `<div>你的词义：<strong>${meaningInput || '<span style="color:#94a3b8;">(未输入)</span>'}</strong></div>` : '<div style="color:#94a3b8;font-size:0.9rem;">(仅拼写模式，未考核词义)</div>'}
                        </div>
                        <div style="background:#f1f5f9; padding:10px; border-radius:6px;">
                            <div style="color:var(--dark-color);">标准拼写：<strong style="font-size:1.15rem; color:var(--primary-color);">${word.word}</strong></div>
                            <div style="color:var(--dark-color);">标准词义：<strong>${word.meanings.join(" / ")}</strong></div>
                        </div>
                        ${missedHtml}
                    </div>
                    ${noteHtml}
                `;
                feedback.className = bgClass; feedback.style.display = "block";
                
                this.syncMissingMeaningGroups();
                this.saveWords(); this.renderWordList(); this.renderWordProgress();
                this.updateStats(true); this.renderDashboard();
                this.hideDictationButtons();
            },

            handleManualError(reasonType) {
                if (!this.isDictationActive) return;
                document.getElementById("spelling-input").disabled = true;
                document.getElementById("dictation-meaning-input").disabled = true;

                const word = this.currentWords[this.currentWordIndex];
                const isRetest = this.retestQueue.has(word.id);
                this.currentIsCorrect = false;
                if (!isRetest) {
                    word.lastErrorType = reasonType;
                    let parsedTargets = [];
                    let currentPos = "";
                    word.meanings.forEach(mStr => {
                        smartSplit(mStr).forEach(p => {
                            let match = p.match(/^([a-z]+[\.])?\s*(.*)$/i);
                            let pos = currentPos;
                            let text = p;
                            if (match && match[1]) {
                                pos = match[1].toLowerCase();
                                if (pos === 'vt.' || pos === 'vi.') pos = 'v.';
                                text = match[2];
                                currentPos = pos;
                            }
                            let subMeanings = splitBySlash(text);
                            subMeanings.forEach(sub => {
                                let originalText = sub.trim();
                                if (!originalText) return;
                                parsedTargets.push((pos ? pos : '') + originalText);
                            });
                        });
                    });
                    word.missedMeanings = parsedTargets;
                    
                    word.lastSpellingInput = ""; 
                    word.lastUpdateTime = Date.now();
                    if (!word.firstMissTime) {
                        word.firstMissTime = Date.now();
                        word.firstErrorType = reasonType;
                        word.firstSpellingInput = "";
                        word.firstMissedMeanings = [...word.missedMeanings];
                    }

                    this.incorrectCount++;
                    word.errorCount++;
                    this.recordRoundError(word, "", "", reasonType);
                    this.retestQueue.add(word.id);
                } else {
                    this.currentWords.splice(this.currentWordIndex + 1 + 6, 0, word);
                }
                
                this.syncMissingMeaningGroups();
                this.saveWords();
                this.renderWordList(); this.renderWordProgress();
                this.updateStats(true); this.renderDashboard();

                let noteHtml = `<div id="dictation-note-container" style="margin-top:15px; padding:12px; background:#fffde7; border-left:4px solid #fbc02d; border-radius:6px;">
                                    <strong style="color:#f57f17;">📝 随记便签：</strong>
                                    <div id="dictation-note-display" style="color:#555; margin-top:5px; font-size:0.95rem;">${word.note || '<span style="color:#9ca3af;">暂无便签，可点击下方按钮添加...</span>'}</div>
                                </div>`;

                const fb = document.getElementById("feedback");
                fb.innerHTML = `
                    <div id="feedback-status" style="font-weight:bold; font-size:1.2rem; margin-bottom:12px; color:var(--warning-color);">❌ 记录：${reasonType}</div>
                    <div style="font-size:1.05rem; line-height:1.7; background:#f1f5f9; padding:10px; border-radius:6px;">
                        <div>标准拼写：<strong style="color:var(--primary-color); font-size:1.15rem;">${word.word}</strong></div>
                        <div>标准词义：<strong>${word.meanings.join(" / ")}</strong></div>
                    </div>
                    ${noteHtml}`;
                fb.className = "feedback incorrect"; fb.style.display = "block";
                this.hideDictationButtons();
            },

            hideDictationButtons() {
                ["submit-answer-btn", "skip-word-btn", "forgot-meaning-btn", "cant-hear-btn"].forEach(id => {
                    const el = document.getElementById(id); if(el) el.style.display = "none";
                });
                
                ["confirm-next-btn", "change-to-correct-btn", "change-to-incorrect-btn", "quick-note-btn", "manual-edit-missed-btn"].forEach(id => {
                    const el = document.getElementById(id); if(el) el.style.display = "inline-block";
                });
                
                const word = this.currentWords[this.currentWordIndex];
                if (word && word.missedMeanings && word.missedMeanings.length > 0) {
                    const noBtn = document.getElementById("mark-no-missing-btn");
                    if(noBtn) noBtn.style.display = "inline-block";
                } else {
                    const noBtn = document.getElementById("mark-no-missing-btn");
                    if(noBtn) noBtn.style.display = "none";
                }
            },

            markNoMissing() {
                const word = this.currentWords[this.currentWordIndex];
                word.missedMeanings = [];
                let spellingOk = (document.getElementById("spelling-input").value.trim().toLowerCase() === word.word.toLowerCase());
                
                if (spellingOk || this.currentIsCorrect) {
                    this.changeToCorrect();
                    const sDiv = document.getElementById("feedback-status");
                    if (sDiv) sDiv.innerHTML = `✨ 完全正确！ <span style="font-size:0.8rem; background:#dcfce7; color:#166534; padding:2px 6px; border-radius:4px;">人工标记无遗漏</span>`;
                } else {
                    word.lastErrorType = "拼写错误";
                    let err = this.roundErrors.find(e => e.word.id === word.id);
                    if (err) err.type = "拼写错误";
                    
                    word.lastUpdateTime = Date.now();
                    this.syncMissingMeaningGroups();
                    this.saveWords();
                    this.renderWordProgress();
                    const fb = document.getElementById("feedback");
                    const sDiv = document.getElementById("feedback-status");
                    if (sDiv) {
                        sDiv.innerHTML = `❌ 拼写错误 <span style="font-size:0.8rem; background:#fee2e2; color:#b91c1c; padding:2px 6px; border-radius:4px;">词义已标为无遗漏</span>`;
                        sDiv.style.color = "var(--error-color)";
                        fb.className = "feedback incorrect";
                    }
                    const mDiv = fb.querySelector('div[style*="background-color:#fffbeb"]');
                    if (mDiv) mDiv.remove();
                }

                document.getElementById("mark-no-missing-btn").style.display = "none";
            },

            manualEditMissed() {
                const word = this.currentWords[this.currentWordIndex];
                const current = word.missedMeanings.join("，");
                const input = prompt("手动输入真正遗漏的词义（用逗号/分号分隔，清空则视为无遗漏）：", current || "");
                if (input !== null) {
                    const newMissed = smartSplit(input).filter(Boolean);
                    if (newMissed.length === 0) {
                        this.markNoMissing();
                        return;
                    }

                    word.missedMeanings = newMissed;
                    let spellingOk = (document.getElementById("spelling-input").value.trim().toLowerCase() === word.word.toLowerCase());
                    
                    if (this.currentIsCorrect) {
                        word.lastErrorType = "词义不全";
                    } else {
                        word.lastErrorType = spellingOk ? "词义不全" : "拼写和词义均错";
                    }
                    word.lastUpdateTime = Date.now();
                    
                    this.syncMissingMeaningGroups();
                    this.saveWords();
                    this.renderWordProgress();
                    
                    const fb = document.getElementById("feedback");
                    let mHtml = `<div style="margin-top:12px; padding:10px; background-color:#fffbeb; border-left:4px solid #f59e0b; border-radius:4px;"><strong style="color:#b45309;">⚠️ 遗漏部分（已修正）：</strong><span style="color:#d97706; font-weight:bold;">${word.missedMeanings.join("，")}</span></div>`;
                    
                    const sDiv = document.getElementById("feedback-status");
                    if (sDiv) {
                        if (this.currentIsCorrect) {
                            sDiv.innerHTML = `👍 拼写正确 (但有词义遗漏)`;
                            sDiv.style.color = 'var(--warning-color)';
                            fb.className = 'feedback warning-pass';
                        } else {
                            sDiv.innerHTML = `❌ 存在错误 (伴随词义遗漏)`;
                            sDiv.style.color = 'var(--error-color)';
                            fb.className = 'feedback incorrect';
                        }
                    }
                    
                    const existingMissed = fb.querySelector('div[style*="background-color:#fffbeb"]');
                    if (existingMissed) existingMissed.remove();
                    
                    const noteContainer = document.getElementById("dictation-note-container");
                    if (noteContainer) {
                        noteContainer.insertAdjacentHTML('beforebegin', mHtml);
                    } else {
                        fb.innerHTML += mHtml;
                    }
                }
            },

            endReviewAndReset() {
                if (!confirm("确定结束并重置这些单词的复习周期？")) return;
                this.currentWords.forEach(w => { w.currentInterval = 0; w.nextReview = Date.now() + 3600000; w.errorCount = 0; });
                this.saveWords(); this.endDictation();
            },

            changeToCorrect() { 
                if (!this.isDictationActive || this.currentIsCorrect) return;
                this.currentIsCorrect = true; 
                
                const word = this.currentWords[this.currentWordIndex];
                const isRetest = this.retestQueue.has(word.id);
                
                if (!isRetest) {
                    this.correctCount++; this.incorrectCount--;
                    word.errorCount = Math.max(0, word.errorCount - 1);
                    if (word.errorCount === 0) {
                        word.firstMissTime = null;
                        word.firstErrorType = "无"; word.firstSpellingInput = ""; word.firstMissedMeanings = [];
                    }
                    this.roundErrors = this.roundErrors.filter(e => e.word.id !== word.id);
                    this.retestQueue.delete(word.id);
                }

                word.lastErrorType = "无";
                word.missedMeanings = []; word.lastSpellingInput = ""; word.lastUpdateTime = Date.now();
                
                for (let i = this.currentWords.length - 1; i > this.currentWordIndex; i--) {
                    if (this.currentWords[i].id === word.id) this.currentWords.splice(i, 1);
                }
                
                this.syncMissingMeaningGroups();
                this.saveWords();
                this.renderWordList(); this.renderWordProgress(); this.updateStats(true); this.renderDashboard();

                const sDiv = document.getElementById("feedback-status");
                sDiv.innerHTML = "✨ 完全正确！ (已强制改判)"; sDiv.style.color = "var(--success-color)";
                document.getElementById("feedback").className = "feedback correct";
                const mDiv = document.getElementById("feedback").querySelector('div[style*="background-color:#fffbeb"]');
                if (mDiv) mDiv.remove();

                document.getElementById("mark-no-missing-btn").style.display = "none";
            },
            
            changeToIncorrect() { 
                if (!this.isDictationActive || !this.currentIsCorrect) return;
                this.currentIsCorrect = false; 
                const word = this.currentWords[this.currentWordIndex];
                const isRetest = this.retestQueue.has(word.id);
                if (!isRetest) {
                    this.correctCount--;
                    this.incorrectCount++;
                    word.errorCount++; 
                    if (!word.firstMissTime) {
                        word.firstMissTime = Date.now();
                        word.firstErrorType = "人工改错";
                        word.firstSpellingInput = ""; word.firstMissedMeanings = [];
                    }
                    this.recordRoundError(word, "人工改错", "", "人工改错");
                    this.retestQueue.add(word.id);
                } else {
                    this.currentWords.splice(this.currentWordIndex + 1 + 6, 0, word);
                }

                word.lastErrorType = "人工改错";
                word.missedMeanings = []; word.lastUpdateTime = Date.now();

                this.syncMissingMeaningGroups();
                this.saveWords(); this.renderWordList(); this.renderWordProgress(); this.updateStats(true); this.renderDashboard();

                const sDiv = document.getElementById("feedback-status");
                sDiv.innerHTML = "❌ 存在错误 (已强制改判)";
                sDiv.style.color = "var(--error-color)";
                document.getElementById("feedback").className = "feedback incorrect";
            },

            updateProgress() {
                const effectiveIndex = Math.min(this.currentWordIndex, this.initialDictationLength);
                const prog = this.initialDictationLength === 0 ? 0 : (effectiveIndex / this.initialDictationLength) * 100;
                document.getElementById("progress-bar").style.width = prog + "%";
                document.getElementById("progress-text").textContent = `${effectiveIndex}/${this.initialDictationLength}`;
            },

            updateStats(isSubmitted = false) {
                document.getElementById("correct-count").textContent = this.correctCount;
                document.getElementById("incorrect-count").textContent = this.incorrectCount;
                
                let passedInitial = Math.min(this.currentWordIndex + (isSubmitted ? 1 : 0), this.initialDictationLength);
                let pendingDictation = this.initialDictationLength - passedInitial;
                document.getElementById("pending-dictation-count").textContent = pendingDictation;
                
                let totalRemaining = this.currentWords.length - this.currentWordIndex - (isSubmitted ? 1 : 0);
                let pendingRetest = totalRemaining - pendingDictation;
                document.getElementById("pending-retest-count").textContent = Math.max(0, pendingRetest);
            },

            endDictation() {
                this.isDictationActive = false;
                document.getElementById("spelling-input-group").style.display = "none";
                document.getElementById("meaning-input-group").style.display = "none";
                ["submit-answer-btn","skip-word-btn","forgot-meaning-btn","cant-hear-btn","end-review-btn","change-to-correct-btn","change-to-incorrect-btn","confirm-next-btn","repeat-word-btn","manual-edit-missed-btn","mark-no-missing-btn", "audio-speed-btn", "quick-note-btn"].forEach(id => {
                    const el = document.getElementById(id); if (el) el.style.display = "none";
                });
                const group = this.currentDictationGroup;
                if (group && this.groups.includes(group)) {
                    if (!this.groupReviewHistories[group]) this.groupReviewHistories[group] = [];
                    this.groupReviewHistories[group].push(Date.now());
                    this.saveGroupHistories(); this.renderReviewSchedule(); this.renderDashboard();
                }

                if (this.roundErrors.length > 0 && group) {
                    const errorGroupName = group === 'all' || group === 'errors' || group === 'due' ? '全部词库错误单词' : (group.endsWith("错误单词") ? group : `${group}错误单词`);
                    if (!this.groups.includes(errorGroupName)) {
                        this.groups.push(errorGroupName);
                        this.groupReviewHistories[errorGroupName] = [];
                        this.saveGroups(); this.saveGroupHistories();
                        this.updateGroupSelect(); this.updateImportGroupSelect();
                        this.renderGroupSelects();
                    }

                    this.roundErrors.forEach(err => {
                        const wordToCopy = err.word;
                        let existing = this.words.find(w => w.group === errorGroupName && w.word.toLowerCase() === wordToCopy.word.toLowerCase());
                        if (!existing) {
                            const cloned = JSON.parse(JSON.stringify(wordToCopy));
                            cloned.id = Date.now() + Math.floor(Math.random() * 100000);
                            cloned.group = errorGroupName;
                            this.words.push(cloned);
                        }
                    });
                    this.saveWords(); this.renderWordList(); this.renderWordProgress(); this.renderDashboard();
                }

                document.getElementById("active-dictation-panel").style.display = "none";
                document.getElementById("mode-selector-div").style.display = "none";
                document.getElementById("summary-panel").style.display = "block";

                const titleEl = document.getElementById("summary-title");
                const listEl = document.getElementById("summary-list");
                if (this.roundErrors.length > 0) {
                    titleEl.innerHTML = '📋 本轮需加强的单词';
                    titleEl.style.color = 'var(--error-color)';
                    let html = "";
                    this.roundErrors.forEach((err, idx) => {
                        html += `
                            <div class="summary-item">
                                <div style="font-size:1.1rem; font-weight:bold; color:var(--dark-color);">
                                     ${idx+1}. <span style="color:var(--primary-color)">${err.word.word}</span> <span style="font-weight:normal; font-size:0.9rem; color:#64748b;">— ${err.word.meanings.join(' / ')}</span>
                                </div>
                                <div style="font-size:0.9rem; margin-top:6px; color:#64748b; background:#f8fafc; padding:8px; border-radius:4px;">
                                    你的输入：<span style="color:var(--error-color); font-weight:bold;">${err.userSpelling}</span> | 
                                    词义：<span style="color:var(--error-color); font-weight:bold;">${err.userMeaning}</span>
                                    <span style="background:#fee2e2; color:#ef4444; padding:2px 6px; border-radius:12px; font-size:0.75rem; margin-left:8px;">${err.type}</span>
                                </div>
                            </div>`;
                    });
                    listEl.innerHTML = html;
                    document.getElementById("summary-retest-btn").style.display = "inline-block";
                } else {
                    titleEl.innerHTML = '🎉 完美通关！'; titleEl.style.color = 'var(--success-color)';
                    listEl.innerHTML = `<div style="text-align:center; padding:50px; font-size:1.5rem; color:var(--success-color);">本次听写完全通过<br>太棒啦！</div>`;
                    document.getElementById("summary-retest-btn").style.display = "none";

                document.getElementById("return-dictation-btn").style.display = "inline-block";
                if (this.isReviewMode) document.getElementById("word-list-panel").classList.remove("hidden");
                this.isReviewMode = false;
            },

            renderReviewSchedule() {

                    } else {
                        groupsToRender = this.groups.filter(g => g === this.currentReviewGroup);

                                </span>

                    });
                    if (history.length > 0) {

                        const diffMsNow = now - lastTime;
                        const diffDays = Math.floor(diffMsNow / (1000 * 60 * 60 * 24));
                        let diffText = diffDays === 0 ? "今天" : (diffDays >= 30 ? `${Math.floor(diffDays / 30)}个月` : `${diffDays}天`);

                        let intervalIndex = Math.min(history.length - 1, INTERVALS_MS.length - 1);
                        const defaultNext = lastTime + INTERVALS_MS[intervalIndex];
                        const nextTime = this.customNextReviews[g] || defaultNext;
                        
                        const diffNextMs = nextTime - now;

                            nextText = `<span style="color:var(--error-color);font-weight:bold;">已超期 (立即复习)</span>`;

                            const diffHours = diffNextMs / 3600000;
                            if (diffHours < 24) nextText = `约 ${Math.ceil(diffHours)} 小时后`;
                            else nextText = `${Math.ceil(diffHours / 24)} 天后`;
                        }

                            <div style="margin-top:10px; padding-top:10px; border-top:1px dashed #e2e8f0; font-size:0.85rem; color:var(--primary-color); display:flex; flex-direction:column; gap:8px;">

                                    <span>下次应在：<b>${nextText}</b></span>
                                    <button onclick="wordApp.editNextReview('${g}')" class="warning btn-tiny" style="padding:2px 6px;">⏰ 改时间</button>
                                </div>
                            </div>
                        `;
                    } else {
                        historyHtml += `<div style="text-align:right; margin-top:8px;">
                            <button onclick="wordApp.addReviewRecord('${g}')" class="success btn-tiny">➕ 新增首条记录</button>
                        </div>`;
                    }
                    
                    const div = document.createElement("div");
                    div.className = "group-review";
                    const isExpanded = this.expandedReviewGroups.has(g);
                    const isActive = isExpanded;
                    div.innerHTML = `
                        <div class="group-header"><span>📁 ${g}</span><span class="toggle-icon">${isActive ? '▲' : '▼'}</span></div>
                        <div class="group-content ${isActive ? 'active' : ''}">${historyHtml}</div>`;
                    div.querySelector('.group-header').addEventListener('click', (e) => {
                        const content = e.currentTarget.nextElementSibling; 
                        const isNowActive = content.classList.toggle('active');
                        e.currentTarget.querySelector('.toggle-icon').textContent = isNowActive ? '▲' : '▼';
                        if (isNowActive) this.expandedReviewGroups.add(g);
                        else this.expandedReviewGroups.delete(g);
                    });
                    list.appendChild(div);
                });
                
                if (groupsToRender.length === 0) list.innerHTML = "<div style='color:#94a3b8; text-align:center; padding:30px;'>这里空空如也</div>";
                setTimeout(() => { list.scrollTop = currentScroll; }, 10);
            },

            renderWordProgress() {
                const container = document.getElementById("word-progress-list");
                const currentScroll = container.scrollTop;
                container.innerHTML = "";
                
                let filteredWords = this.words;
                const now = Date.now();
                if (this.currentProgressGroup !== "all") {
                    if (this.currentProgressGroup === "errors") {
                        filteredWords = this.words.filter(w => w.errorCount > 0);
                    } else if (this.currentProgressGroup === "due") {
                        filteredWords = this.words.filter(w => w.nextReview <= now);
                    } else {
                        filteredWords = this.words.filter(w => w.group === this.currentProgressGroup);
                    }
                }

                const grouped = {};
                filteredWords.forEach(w => { if (!grouped[w.group]) grouped[w.group] = []; grouped[w.group].push(w); });
                const sortedGroupNames = Object.keys(grouped).sort((a, b) => {
                    const indexA = this.groups.indexOf(a);
                    const indexB = this.groups.indexOf(b);
                    const posA = indexA === -1 ? 9999 : indexA;
                    const posB = indexB === -1 ? 9999 : indexB;
                    return posA - posB;
                });
                sortedGroupNames.forEach(groupName => {
                    const groupDiv = document.createElement("div"); groupDiv.className = "group-review";
                    
                    const isExpanded = this.expandedProgressGroups.has(groupName);
                    const isActive = isExpanded;
                    groupDiv.innerHTML = `
                        <div class="group-header"><span>单元：${groupName}（${grouped[groupName].length} 词）</span><span class="toggle-icon">${isActive ? '▲' : '▼'}</span></div>
                        <div class="group-content ${isActive ? 'active' : ''}" style="padding:5px;"></div>`;
                    
                    const contentDiv = groupDiv.querySelector(".group-content");

                    grouped[groupName].forEach(w => {
                        const item = document.createElement("div");
                        item.className = "word-progress-item";
                        item.id = `err-card-${w.id}`;
                        let firstText = w.firstMissTime ? `<span style="color:#ef4444">${w.firstErrorType}</span> (${new Date(w.firstMissTime).toLocaleDateString()})` : "<span style='color:#a1a1aa;'>未产生错误</span>";
                        
                        let hasFirstSpellErr = (w.firstErrorType && w.firstErrorType.includes("拼写")) || (w.firstSpellingInput && w.firstSpellingInput.toLowerCase() !== w.word.toLowerCase());
                        let firstSpellingHtml = hasFirstSpellErr ? `<div class="spell-highlight">❌ 错拼：${getSpellingHighlight(w.word, w.firstSpellingInput)}</div>` : "";
                        let firstMissedHtml = (w.firstMissedMeanings && w.firstMissedMeanings.length) ? `<div class="missed-highlight">⚠️ 漏义：${w.firstMissedMeanings.join("，")}</div>` : "";

                        let latestText = w.lastErrorType === "无" ? "<span style='color:#10b981;'>已掌握</span>" : `<span style="color:#ef4444">${w.lastErrorType}</span> (${w.lastUpdateTime ? new Date(w.lastUpdateTime).toLocaleDateString() : '-'})`;
                        
                        let hasLastSpellErr = (w.lastErrorType && w.lastErrorType.includes("拼写")) || (w.lastSpellingInput && w.lastSpellingInput.toLowerCase() !== w.word.toLowerCase());
                        let latestSpellingHtml = hasLastSpellErr ? `<div class="spell-highlight">❌ 错拼：${getSpellingHighlight(w.word, w.lastSpellingInput)}</div>` : "";
                        let latestMissedHtml = (w.missedMeanings && w.missedMeanings.length) ? `<div class="missed-highlight">⚠️ 漏义：${w.missedMeanings.join("，")}</div>` : "";
                        
                        // 替换为全新的 Soft UI 按钮
                        item.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                                <div style="font-size:1.05rem; display:flex; align-items:center;">
                                    <strong>${w.word}</strong>
                                    <button onclick="wordApp.speakWord('${w.word.replace(/'/g, "\\'")}')" class="btn-audio" title="朗读发音">🔊</button>
                                    <span style="color:#64748b; font-size:0.9rem; margin-left:6px;">— ${w.meanings.join(" / ")}</span>
                                 </div>
                                <div>
                                    ${w.errorCount > 0 ? `<span class="err-badge">错 ${w.errorCount} 次</span>` : `<span style="color:#10b981; font-size:0.8rem; font-weight:bold;">无错记录</span>`}
                                    <button onclick="wordApp.deleteWord(${w.id})" class="error btn-tiny" style="margin-left:5px;">删除</button>
                                </div>
                            </div>
                            
                            <div class="state-card">
                                <div class="state-col state-col-left">
                                    <div class="state-title">首次薄弱点</div>
                                    <div class="state-content">
                                        <div>${firstText}</div>
                                        ${firstSpellingHtml}
                                        ${firstMissedHtml}
                                     </div>
                                    <div class="state-actions">
                                        <button onclick="wordApp.editSpellingRecord(${w.id}, true)" class="btn-tiny btn-soft-blue">修拼写</button>
                                        <button onclick="wordApp.editMeaningRecord(${w.id}, true)" class="btn-tiny btn-soft-orange">修遗漏</button>
                                        <button onclick="wordApp.clearFirstRecord(${w.id})" class="btn-tiny btn-soft-red">清记录</button>
                                     </div>
                                </div>
                                <div class="state-col">
                                    <div class="state-title">当前状态</div>
                                    <div class="state-content">
                                        <div>${latestText}</div>
                                        ${latestSpellingHtml}
                                        ${latestMissedHtml}
                                    </div>
                                    <div class="state-actions">
                                        <button onclick="wordApp.editSpellingRecord(${w.id}, false)" class="btn-tiny btn-soft-blue">修拼写</button>
                                        <button onclick="wordApp.editMeaningRecord(${w.id}, false)" class="btn-tiny btn-soft-orange">修遗漏</button>
                                        <button onclick="wordApp.markFullyRemembered(${w.id})" class="btn-tiny btn-soft-green">记牢</button>
                                    </div>
                                </div>
                            </div>
        
                            <div class="note-box">
                                <div class="note-header">
                                    <span>📝 错题便签</span>
                                    <button class="btn-tiny btn-soft-purple" onclick="wordApp.editNote(${w.id})">编辑</button>
                                </div>
                                <div style="color:#555;">${w.note || "暂无记录，点击编辑添加专属记忆笔记..."}</div>
                            </div>
                        `;
                        contentDiv.appendChild(item);
                    });

                    groupDiv.querySelector('.group-header').addEventListener('click', (e) => {
                        const content = e.currentTarget.nextElementSibling; 
                        const isNowActive = content.classList.toggle('active');
                        e.currentTarget.querySelector('.toggle-icon').textContent = isNowActive ? '▲' : '▼';
                        if (isNowActive) this.expandedProgressGroups.add(groupName);
                        else this.expandedProgressGroups.delete(groupName);
                    });
                    container.appendChild(groupDiv);
                });

                if (Object.keys(grouped).length === 0) container.innerHTML = "<div style='color:#94a3b8; text-align:center; padding:30px;'>这里空空如也</div>";
                
                setTimeout(() => { container.scrollTop = currentScroll; }, 10);
            },

            autoSave() {
                this.exportData();
            }
        };

        document.addEventListener("DOMContentLoaded", () => wordApp.init());
    </script>
</body>
</html>
